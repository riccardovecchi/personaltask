<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Professional</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Task Manager</h1>
            </div>

            <div class="sidebar-section">
                <h3>Filtri</h3>
                <button class="filter-btn active" data-filter="all">
                    <span class="icon">📋</span> Tutti i Task
                    <span class="count" id="count-all">0</span>
                </button>
                <button class="filter-btn" data-filter="active">
                    <span class="icon">⚡</span> Attivi
                    <span class="count" id="count-active">0</span>
                </button>
                <button class="filter-btn" data-filter="completed">
                    <span class="icon">✓</span> Completati
                    <span class="count" id="count-completed">0</span>
                </button>
            </div>

            <div class="sidebar-section">
                <h3>Categorie</h3>
                <button class="category-btn" data-category="Lavoro">
                    <span class="category-dot" style="background: #3b82f6;"></span> Lavoro
                </button>
                <button class="category-btn" data-category="Personale">
                    <span class="category-dot" style="background: #8b5cf6;"></span> Personale
                </button>
                <button class="category-btn" data-category="Salute">
                    <span class="category-dot" style="background: #10b981;"></span> Salute
                </button>
                <button class="category-btn" data-category="Finanze">
                    <span class="category-dot" style="background: #f59e0b;"></span> Finanze
                </button>
                <button class="category-btn" data-category="Casa">
                    <span class="category-dot" style="background: #ec4899;"></span> Casa
                </button>
                <button class="category-btn" data-category="Hobby">
                    <span class="category-dot" style="background: #06b6d4;"></span> Hobby
                </button>
                <button class="category-btn" data-category="Studio">
                    <span class="category-dot" style="background: #6366f1;"></span> Studio
                </button>
                <button class="category-btn" data-category="Sport">
                    <span class="category-dot" style="background: #14b8a6;"></span> Sport
                </button>
                <button class="category-btn" data-category="Famiglia">
                    <span class="category-dot" style="background: #f43f5e;"></span> Famiglia
                </button>
                <button class="category-btn" data-category="Progetti">
                    <span class="category-dot" style="background: #a855f7;"></span> Progetti
                </button>
                <button class="category-btn" data-category="Shopping">
                    <span class="category-dot" style="background: #eab308;"></span> Shopping
                </button>
                <button class="category-btn" data-category="Viaggi">
                    <span class="category-dot" style="background: #0ea5e9;"></span> Viaggi
                </button>
            </div>

            <div class="sidebar-section">
                <h3>Priorità</h3>
                <button class="priority-btn" data-priority="alta">
                    <span class="priority-indicator high"></span> Alta
                </button>
                <button class="priority-btn" data-priority="media">
                    <span class="priority-indicator medium"></span> Media
                </button>
                <button class="priority-btn" data-priority="bassa">
                    <span class="priority-indicator low"></span> Bassa
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Cerca task..." class="search-input">
                </div>
                <button class="btn-primary" id="btn-new-task">
                    <span class="icon">+</span> Nuovo Task
                </button>
            </div>

            <div class="tasks-container" id="tasks-container">
                <!-- I task verranno inseriti qui dinamicamente -->
            </div>
        </main>
    </div>

    <!-- Modal per creare/modificare task -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Nuovo Task</h2>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Titolo *</label>
                    <input type="text" id="task-title" required placeholder="Es. Completare report mensile">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Categoria *</label>
                        <select id="task-category" required>
                            <option value="">Seleziona categoria</option>
                            <option value="Lavoro">Lavoro</option>
                            <option value="Personale">Personale</option>
                            <option value="Salute">Salute</option>
                            <option value="Finanze">Finanze</option>
                            <option value="Casa">Casa</option>
                            <option value="Hobby">Hobby</option>
                            <option value="Studio">Studio</option>
                            <option value="Sport">Sport</option>
                            <option value="Famiglia">Famiglia</option>
                            <option value="Progetti">Progetti</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Viaggi">Viaggi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">Priorità *</label>
                        <select id="task-priority" required>
                            <option value="bassa">Bassa</option>
                            <option value="media" selected>Media</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="task-due-date">Data di scadenza</label>
                    <input type="date" id="task-due-date">
                </div>

                <div class="form-group">
                    <label for="task-notes">Note</label>
                    <textarea id="task-notes" rows="4" placeholder="Aggiungi dettagli o note..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btn-cancel">Annulla</button>
                    <button type="submit" class="btn-primary" id="btn-save">Salva Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
