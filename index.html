<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Task Manager Professional</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📋 Task Manager</h1>
                <button class="btn-backup" id="btn-backup" title="Scarica Backup">
                    💾
                </button>
            </div>

            <!-- Navigation Tabs -->
            <div class="nav-tabs">
                <button class="nav-tab active" data-view="tasks">
                    <span class="icon">✓</span>
                    <span>Task</span>
                </button>
                <button class="nav-tab" data-view="projects">
                    <span class="icon">📁</span>
                    <span>Progetti</span>
                </button>
                <button class="nav-tab" data-view="notes">
                    <span class="icon">📝</span>
                    <span>Note</span>
                </button>
            </div>

            <!-- Filtri Task -->
            <div class="sidebar-section" id="filters-tasks">
                <h3>Filtri</h3>
                <button class="filter-btn active" data-filter="all">
                    <span class="icon">📋</span> Tutti i Task
                    <span class="count" id="count-all">0</span>
                </button>
                <button class="filter-btn" data-filter="active">
                    <span class="icon">⚡</span> Attivi
                    <span class="count" id="count-active">0</span>
                </button>
                <button class="filter-btn" data-filter="completed">
                    <span class="icon">✓</span> Completati
                    <span class="count" id="count-completed">0</span>
                </button>
            </div>

            <!-- Categorie -->
            <div class="sidebar-section">
                <h3>Categorie</h3>
                <div class="categories-list">
                    <button class="category-btn" data-category="Lavoro">
                        <span class="category-dot" style="background: #3b82f6;"></span> Lavoro
                    </button>
                    <button class="category-btn" data-category="Personale">
                        <span class="category-dot" style="background: #8b5cf6;"></span> Personale
                    </button>
                    <button class="category-btn" data-category="Salute">
                        <span class="category-dot" style="background: #10b981;"></span> Salute
                    </button>
                    <button class="category-btn" data-category="Finanze">
                        <span class="category-dot" style="background: #f59e0b;"></span> Finanze
                    </button>
                    <button class="category-btn" data-category="Casa">
                        <span class="category-dot" style="background: #ec4899;"></span> Casa
                    </button>
                    <button class="category-btn" data-category="Hobby">
                        <span class="category-dot" style="background: #06b6d4;"></span> Hobby
                    </button>
                    <button class="category-btn" data-category="Studio">
                        <span class="category-dot" style="background: #6366f1;"></span> Studio
                    </button>
                    <button class="category-btn" data-category="Sport">
                        <span class="category-dot" style="background: #14b8a6;"></span> Sport
                    </button>
                    <button class="category-btn" data-category="Famiglia">
                        <span class="category-dot" style="background: #f43f5e;"></span> Famiglia
                    </button>
                    <button class="category-btn" data-category="Progetti">
                        <span class="category-dot" style="background: #a855f7;"></span> Progetti
                    </button>
                    <button class="category-btn" data-category="Shopping">
                        <span class="category-dot" style="background: #eab308;"></span> Shopping
                    </button>
                    <button class="category-btn" data-category="Viaggi">
                        <span class="category-dot" style="background: #0ea5e9;"></span> Viaggi
                    </button>
                </div>
            </div>

            <!-- Priorità (solo per task) -->
            <div class="sidebar-section" id="filters-priority">
                <h3>Priorità</h3>
                <button class="priority-btn" data-priority="alta">
                    <span class="priority-indicator high"></span> Alta
                </button>
                <button class="priority-btn" data-priority="media">
                    <span class="priority-indicator medium"></span> Media
                </button>
                <button class="priority-btn" data-priority="bassa">
                    <span class="priority-indicator low"></span> Bassa
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Cerca..." class="search-input">
                </div>
                <button class="btn-primary" id="btn-new-item">
                    <span class="icon">+</span> <span id="btn-new-text">Nuovo Task</span>
                </button>
            </div>

            <!-- Container Tasks -->
            <div class="content-view active" id="view-tasks">
                <div class="tasks-container" id="tasks-container">
                    <!-- Tasks inseriti dinamicamente -->
                </div>
            </div>

            <!-- Container Projects -->
            <div class="content-view" id="view-projects">
                <div class="projects-container" id="projects-container">
                    <!-- Projects inseriti dinamicamente -->
                </div>
            </div>

            <!-- Container Notes -->
            <div class="content-view" id="view-notes">
                <div class="notes-container" id="notes-container">
                    <!-- Notes inserite dinamicamente -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Task -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="task-modal-title">Nuovo Task</h2>
                <button class="btn-close" id="btn-close-task-modal">&times;</button>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Titolo *</label>
                    <input type="text" id="task-title" required placeholder="Es. Completare report mensile">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Categoria *</label>
                        <select id="task-category" required>
                            <option value="">Seleziona categoria</option>
                            <option value="Lavoro">Lavoro</option>
                            <option value="Personale">Personale</option>
                            <option value="Salute">Salute</option>
                            <option value="Finanze">Finanze</option>
                            <option value="Casa">Casa</option>
                            <option value="Hobby">Hobby</option>
                            <option value="Studio">Studio</option>
                            <option value="Sport">Sport</option>
                            <option value="Famiglia">Famiglia</option>
                            <option value="Progetti">Progetti</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Viaggi">Viaggi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">Priorità *</label>
                        <select id="task-priority" required>
                            <option value="bassa">Bassa</option>
                            <option value="media" selected>Media</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="task-project">Progetto (opzionale)</label>
                    <select id="task-project">
                        <option value="">Nessun progetto</option>
                        <!-- Popolato dinamicamente -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="task-due-date">Data di scadenza</label>
                    <input type="date" id="task-due-date">
                </div>

                <div class="form-group">
                    <label for="task-notes">Note</label>
                    <textarea id="task-notes" rows="4" placeholder="Aggiungi dettagli o note..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btn-cancel-task">Annulla</button>
                    <button type="submit" class="btn-primary">Salva Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Project -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="project-modal-title">Nuovo Progetto</h2>
                <button class="btn-close" id="btn-close-project-modal">&times;</button>
            </div>
            <form id="project-form">
                <div class="form-group">
                    <label for="project-name">Nome Progetto *</label>
                    <input type="text" id="project-name" required placeholder="Es. Ristrutturazione Casa">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="project-category">Categoria *</label>
                        <select id="project-category" required>
                            <option value="">Seleziona categoria</option>
                            <option value="Lavoro">Lavoro</option>
                            <option value="Personale">Personale</option>
                            <option value="Salute">Salute</option>
                            <option value="Finanze">Finanze</option>
                            <option value="Casa">Casa</option>
                            <option value="Hobby">Hobby</option>
                            <option value="Studio">Studio</option>
                            <option value="Sport">Sport</option>
                            <option value="Famiglia">Famiglia</option>
                            <option value="Progetti">Progetti</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Viaggi">Viaggi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="project-status">Stato</label>
                        <select id="project-status">
                            <option value="planning">In Pianificazione</option>
                            <option value="active" selected>Attivo</option>
                            <option value="paused">In Pausa</option>
                            <option value="completed">Completato</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="project-description">Descrizione</label>
                    <textarea id="project-description" rows="4" placeholder="Descrivi il progetto..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="project-start-date">Data Inizio</label>
                        <input type="date" id="project-start-date">
                    </div>

                    <div class="form-group">
                        <label for="project-end-date">Data Fine Prevista</label>
                        <input type="date" id="project-end-date">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btn-cancel-project">Annulla</button>
                    <button type="submit" class="btn-primary">Salva Progetto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Note -->
    <div class="modal" id="note-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="note-modal-title">Nuova Nota</h2>
                <button class="btn-close" id="btn-close-note-modal">&times;</button>
            </div>
            <form id="note-form">
                <div class="form-group">
                    <label for="note-title">Titolo *</label>
                    <input type="text" id="note-title" required placeholder="Es. Idee per il progetto">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="note-category">Categoria</label>
                        <select id="note-category">
                            <option value="">Nessuna categoria</option>
                            <option value="Lavoro">Lavoro</option>
                            <option value="Personale">Personale</option>
                            <option value="Salute">Salute</option>
                            <option value="Finanze">Finanze</option>
                            <option value="Casa">Casa</option>
                            <option value="Hobby">Hobby</option>
                            <option value="Studio">Studio</option>
                            <option value="Sport">Sport</option>
                            <option value="Famiglia">Famiglia</option>
                            <option value="Progetti">Progetti</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Viaggi">Viaggi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="note-project">Progetto</label>
                        <select id="note-project">
                            <option value="">Nessun progetto</option>
                            <!-- Popolato dinamicamente -->
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="note-content">Contenuto *</label>
                    <textarea id="note-content" rows="10" required placeholder="Scrivi qui i tuoi appunti..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btn-cancel-note">Annulla</button>
                    <button type="submit" class="btn-primary">Salva Nota</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle">
        ☰
    </button>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <script src="app.js"></script>
</body>
</html>
